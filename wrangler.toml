name = "timberlovingcare"
main = "src/worker.js"
# Set this to today's date
compatibility_date = "2026-03-06"
compatibility_flags = [ "nodejs_compat" ]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [ "/*", "!/public/*" ]

[build]
command = "npm run build"
